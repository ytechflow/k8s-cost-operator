name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      HARBOR_REGISTRY: harbor.dev01.sayzx.fr
      IMAGE_REPOSITORY: admin/cost-operator
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.harbor_user }}
          password: ${{ secrets.harbor_pass }}
      
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Build and push release image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.version.outputs.VERSION }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.VERSION }}
          body: |
            ## Release v${{ steps.version.outputs.VERSION }}
            
            ### 🐳 Docker Images
            - Harbor: `${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.version.outputs.VERSION }}`
            
            ### 📦 Helm Installation
            ```bash
            helm install cost-operator ./helm/cost-operator \
              --set image.tag=${{ steps.version.outputs.VERSION }}
            ```
            
            ### 🚀 Quick Deploy
            ```bash
            helm install cost-operator ./helm/cost-operator \
              --set image.repository=yourusername/cost-operator \
              --set image.tag=${{ steps.version.outputs.VERSION }}
            ```
          draft: false
          prerelease: false
