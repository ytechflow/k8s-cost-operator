name: Harbor Docker Push

on:
  push:
    branches:
      - main
      - develop

jobs:
  push-image:
    runs-on: ubuntu-latest
    env:
      HARBOR_REGISTRY: harbor.dev01.sayzx.fr
      IMAGE_REPOSITORY: cost-operator/cost-operator
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USER || secrets.harbor_user }}
          password: ${{ secrets.HARBOR_PASSWORD || secrets.harbor_pass }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest
