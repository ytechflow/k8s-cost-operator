apiVersion: cost.k8s.io/v1
kind: CostReport
metadata:
  name: daily-analysis
  namespace: default
spec:
  # Analyse tout le cluster
  scope: cluster
  
  # Schedule cron: chaque jour à minuit
  schedule: "0 0 * * *"
  
  # Sauvegarde dans un ConfigMap
  output: configmap
  
  # URL de Prometheus (optional, sinon utilise metrics-server)
  prometheusUrl: "http://prometheus:9090"
  
  # Nom du cluster pour le rapport
  clusterName: "production"

  # Dossier logique pour retrouver le rapport dans le front
  folder: "production"
  
  # Ne pas appliquer automatiquement les recommandations
  autoApply: false
  
  # Namespaces à exclure
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - cert-manager

---
apiVersion: cost.k8s.io/v1
kind: CostReport
metadata:
  name: namespace-analysis
  namespace: production
spec:
  # Analyse seulement le namespace actuel
  scope: namespace
  
  # Schedule cron: toutes les heures
  schedule: "0 * * * *"
  
  # Sauvegarde en fichier
  output: file
  outputPath: "/tmp/cost-reports"
  
  # Utilise metrics-server (pas de Prometheus)
  # prometheusUrl: ""
  
  # Cluster name
  clusterName: "production"

  # Dossier logique pour retrouver le rapport dans le front
  folder: "production"
  
  # Auto-apply mode désactivé (sécurité)
  autoApply: false
