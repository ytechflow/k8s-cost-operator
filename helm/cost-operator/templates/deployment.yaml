apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "cost-operator.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.deploymentStrategy | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "cost-operator.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "cost-operator.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      serviceAccountName: {{ include "cost-operator.serviceAccountName" . }}
      
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      
      containers:
      - name: operator
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        
        env:
        - name: KOPF_DEBUG
          value: "{{ .Values.config.debug }}"

        - name: KOPF_LOGLEVEL
          value: "{{ .Values.config.logLevel }}"
        
        - name: PROMETHEUS_URL
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.configMap.name }}
              key: prometheus-url
              optional: true
        
        - name: CLUSTER_NAME
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.configMap.name }}
              key: cluster-name
              optional: true

        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.configMap.name }}
              key: log-level
              optional: true

        - name: EXCLUDE_NAMESPACES
          valueFrom:
            configMapKeyRef:
              name: {{ .Values.configMap.name }}
              key: exclude-namespaces
              optional: true
        
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: reports
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
      
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: reports
        persistentVolumeClaim:
          claimName: {{ include "cost-operator.fullname" . }}
      {{- end }}
      
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
