# Exemple 2: Avec Prometheus et rapports avancés

image:
  registry: my-registry.com
  repository: cost-operator
  tag: "1.0.0"

replicaCount: 1

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

config:
  clusterName: "production-us-east-1"
  logLevel: "DEBUG"
  prometheusUrl: "http://prometheus:9090"
  prometheusTimeout: "15s"
  analysisInterval: 1800  # 30 minutes
  excludeNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - cert-manager
    - monitoring

reports:
  enabled: true
  default:
    name: "daily-analysis"
    namespace: default
    scope: "cluster"
    schedule: "0 0 * * *"  # 00:00 UTC
    output: "configmap"
    autoApply: false
    clusterName: "production-us-east-1"
    prometheusUrl: "http://prometheus:9090"

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s

# Affinity pour éviter les multiples sur le même node
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - cost-operator
          topologyKey: kubernetes.io/hostname
