apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: costreports.cost.k8s.io
  annotations:
    api-approved.kubernetes.io: https://github.com/kubernetes/enhancements/pull/1111
spec:
  group: cost.k8s.io
  names:
    kind: CostReport
    plural: costreports
    singular: costreport
    shortNames:
      - cr
      - creport
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - scope
              properties:
                schedule:
                  type: string
                  description: "Cron schedule (ex: '0 * * * *' pour toutes les heures)"
                  default: "0 * * * *"

                scope:
                  type: string
                  description: "'cluster' ou 'namespace'"
                  enum:
                    - cluster
                    - namespace
                  default: "cluster"

                output:
                  type: string
                  description: "'configmap' ou 'file'"
                  enum:
                    - configmap
                    - file
                  default: "configmap"

                outputPath:
                  type: string
                  default: "/tmp"

                autoApply:
                  type: boolean
                  default: false

                prometheusUrl:
                  type: string
                  description: "URL de Prometheus"

                clusterName:
                  type: string
                  default: "kubernetes"

                folder:
                  type: string
                  description: "Dossier logique pour regrouper les rapports dans le front"

                excludeNamespaces:
                  type: array
                  items:
                    type: string
                  default:
                    - kube-system
                    - kube-public
                    - kube-node-lease

                excludePods:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string

            status:
              type: object
              properties:
                lastAnalysis:
                  type: string

                status:
                  type: string
                  enum:
                    - pending
                    - running
                    - completed
                    - error

                error:
                  type: string

                recommendations:
                  type: integer

                totalSavings:
                  type: string

                optimizationScore:
                  type: string

      subresources:
        status: {}